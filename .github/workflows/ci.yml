# Compile gate: every specs/*.symboleo must compile with 0 errors.
#
# The gate POSTs each spec to the deployed SymboleoAC-Web bridge's /generate
# endpoint (same codegen the Web IDE uses) and checks summary.errors == 0.
# No compiler jar or Maven build is needed in CI. Local dev uses the jar
# instead — see tests/compile/run.sh (both backends) and ../../CLAUDE.md.
#
# Override the backend by setting a repo variable BACKEND_URL
# (Settings -> Secrets and variables -> Actions -> Variables); otherwise the
# default below (the current VPS) is used.

name: compile-specs

on:
  push:
    paths: ['specs/**', 'tests/compile/**', '.github/workflows/ci.yml']
  pull_request:
    paths: ['specs/**', 'tests/compile/**', '.github/workflows/ci.yml']
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    env:
      BACKEND_URL: ${{ vars.BACKEND_URL || 'https://159-69-216-244.sslip.io' }}
    steps:
      - uses: actions/checkout@v4

      # jq and curl are preinstalled on ubuntu-latest; assert jq to be explicit.
      - name: Tooling
        run: jq --version

      - name: Compile every spec (remote gate)
        run: bash tests/compile/run.sh specs
