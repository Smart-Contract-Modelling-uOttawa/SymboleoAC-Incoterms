# Compile gate: every specs/*.symboleo must compile with 0 errors.
#
# SKELETON — the spawned session must wire up how CODEGEN_JAR is produced
# (build from SymboleoAC2SC, or fetch a released/vendored codegen-cli jar).
# Left as a documented placeholder so the first real run is a deliberate step.

name: compile-specs

on:
  push:
    paths: ['specs/**', '.github/workflows/ci.yml']
  pull_request:
    paths: ['specs/**']
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # TODO: produce the SymboleoAC compiler fat jar and export CODEGEN_JAR.
      # Option A — build from SymboleoAC2SC:
      #   - run: git clone --depth 1 https://github.com/Smart-Contract-Modelling-uOttawa/SymboleoAC2SC.git
      #   - run: (cd SymboleoAC2SC/<cli-module> && mvn -B clean package)
      #   - run: echo "CODEGEN_JAR=$PWD/SymboleoAC2SC/<cli-module>/target/<jar>" >> "$GITHUB_ENV"
      # Option B — download a released codegen-cli jar and set CODEGEN_JAR to it.

      - name: Compile every spec
        run: |
          set -euo pipefail
          if [ -z "${CODEGEN_JAR:-}" ]; then
            echo "CODEGEN_JAR is not set — wire up the compiler jar (see TODO above)."; exit 1
          fi
          fail=0
          for f in specs/*.symboleo; do
            echo "== $f =="
            out=$(java -jar "$CODEGEN_JAR" < "$f") || true
            echo "$out" | grep -q '"errors":0' || { echo "FAILED: $f"; echo "$out"; fail=1; }
          done
          exit $fail
