# Incoterms 2020 allocation tables — the source of truth for generation.
# Transcribed from the ICC cost- and risk-allocation tables (see the project's
# Incoterms 2020 reference). "S" = seller, "B" = buyer, "S/B" = shared/either.
#
# The generator reads this file + the norm templates and emits specs/<code>.symboleo.
# Keeping the standard's own tables as data is what makes the 11 specs consistent
# and lets differential tests assert the inter-rule differences.

# 13 cost stages, in order, matching the ICC cost-allocation table columns.
cost_stages:
  - loading_at_origin
  - export_customs_declaration
  - carriage_to_port_of_export
  - unloading_truck_port_of_export
  - loading_on_vessel
  - carriage_to_port_of_import
  - insurance
  - unloading_port_of_import
  - loading_on_truck_port_of_import
  - carriage_to_place_of_destination
  - import_customs_clearance
  - import_duties_and_taxes
  - unloading_at_destination

# Where risk passes from seller to buyer (the delivery point).
# One of: seller_premises | named_place | first_carrier | alongside_ship |
#         on_board | port_of_destination | destination_place | destination_terminal
#
# b3_triggers - the B3/B9(d) premature risk/cost transfer limbs the specs model
# (the rules' only real "consequence" logic; every limb is guarded by the ICC
# proviso "provided the goods have been clearly identified as the contract
# goods"). Values:
#   nomination_violated        buyer fails to nominate the vessel/carrier or
#                              give B10 notice in time (F-terms; the modelled
#                              notice IS the nomination obligation)
#   vessel_failed              FAS/FOB B3: the nominated vessel fails to arrive
#                              on time, fails to take the goods, or closes for
#                              cargo earlier than the notified time
#   carrier_failed             FCA B3(a)(ii): the nominated carrier fails to
#                              take the goods into its charge
#   import_clearance_violated  DAP/DPU B3(a): the buyer fails its B7 import
#                              clearance duty (adds the buyer-side
#                              oImportClearanceBuyer obligation + importDays)
#   take_delivery_violated     EXW B9(d): the buyer fails to take delivery
# The B10-notice-only limbs of EXW/CPT/CIP/CFR/CIF and DDP's B7-assistance limb
# are NOT yet modelled (no notice obligation exists for those rules); see
# coverage/coverage-matrix.md.
#
# assistance - the ICC request-triggered assistance pattern ("at the
# requester's request, risk and cost", recurring in A4/A5/A6/A7(b), B5 and
# B7(a) and reimbursed via A9/B9). Modelled as one assistance channel per
# direction (request -> assist obligation -> reimbursement obligation); the
# per-article topics below are carried into the generated spec as comments,
# so the coverage matrix can trace each article to the channel.
rules:
  EXW:
    name: Ex Works
    family: any_mode
    delivery_point: seller_premises
    seller_insurance: false
    export_clearance: buyer      # EXW: buyer clears export (seller assists)
    import_clearance: buyer
    cost: [B,B,B,B,B,B,B,B,B,B,B,B,B]
    b3_triggers: [take_delivery_violated]
    assistance:
      to_buyer:
        - "A4: transport information incl. security requirements"
        - "A5: insurance information"
        - "A7: export/transit/import clearance documents and information (EXW: all clearance is the buyer's)"
      to_seller: []
  FCA:
    name: Free Carrier
    family: any_mode
    delivery_point: first_carrier    # named place
    seller_insurance: false
    export_clearance: seller
    import_clearance: buyer
    cost: [S,S,"S/B",B,B,B,B,B,B,B,B,B,B]
    b3_triggers: [nomination_violated, carrier_failed]
    assistance:
      to_buyer:
        - "A4: transport information incl. security requirements"
        - "A5: insurance information"
        - "A6: obtaining a transport document, where the proof of delivery is not one"
        - "A7(b): transit/import clearance documents and information"
      to_seller:
        - "B7(a): export clearance documents and information"
  CPT:
    name: Carriage Paid To
    family: any_mode
    delivery_point: first_carrier
    seller_insurance: false
    export_clearance: seller
    import_clearance: buyer
    cost: [S,S,S,S,S,S,B,"S/B","S/B",B,B,B,B]
    b3_triggers: []          # B10-notice limb only; notice obligation not yet modelled
    assistance:
      to_buyer:
        - "A5: insurance information"
        - "A7(b): transit/import clearance documents and information"
      to_seller:
        - "B7(a): export clearance documents and information"
  CIP:
    name: Carriage and Insurance Paid To
    family: any_mode
    delivery_point: first_carrier
    seller_insurance: true
    insurance_cover: ICC_A_110pct       # Incoterms 2020 raised CIP to ICC (A)
    export_clearance: seller
    import_clearance: buyer
    cost: [S,S,S,S,S,S,S,"S/B","S/B",B,B,B,B]
    b3_triggers: []          # B10-notice limb only; notice obligation not yet modelled
    assistance:
      to_buyer:
        - "A5: information for additional cover (War/Strikes) requested by the buyer"
        - "A7(b): transit/import clearance documents and information"
      to_seller:
        - "B7(a): export clearance documents and information"
        - "B5: information for additional cover (War/Strikes) the buyer requested"
  DAP:
    name: Delivered At Place
    family: any_mode
    delivery_point: destination_place
    seller_insurance: false
    export_clearance: seller
    import_clearance: buyer
    cost: [S,S,S,S,S,S,S,S,S,S,B,B,B]
    b3_triggers: [import_clearance_violated]
    assistance:
      to_buyer:
        - "A7(b): import clearance documents and information"
      to_seller:
        - "B7(a): export/transit clearance documents and information"
        - "B5: information the seller needs for obtaining insurance"
  DPU:
    name: Delivered At Place Unloaded
    family: any_mode
    delivery_point: destination_terminal   # unloaded at destination
    seller_insurance: false
    export_clearance: seller
    import_clearance: buyer
    cost: [S,S,S,S,S,S,S,S,S,S,B,B,S]
    b3_triggers: [import_clearance_violated]
    assistance:
      to_buyer:
        - "A7(b): import clearance documents and information"
      to_seller:
        - "B7(a): export/transit clearance documents and information"
        - "B5: information the seller needs for obtaining insurance"
  DDP:
    name: Delivered Duty Paid
    family: any_mode
    delivery_point: destination_place
    seller_insurance: false
    export_clearance: seller
    import_clearance: seller
    cost: [S,S,S,S,S,S,S,S,S,S,S,S,B]
    b3_triggers: []          # B7-assistance limb; assistance has no deadline to violate
    assistance:
      to_buyer: []
      to_seller:
        - "B7: clearance documents and information for the seller's export/transit/import formalities"
        - "B5: information the seller needs for obtaining insurance"
  FAS:
    name: Free Alongside Ship
    family: sea
    delivery_point: alongside_ship
    seller_insurance: false
    export_clearance: seller
    import_clearance: buyer
    cost: [S,S,S,S,B,B,B,B,B,B,B,B,B]
    b3_triggers: [nomination_violated, vessel_failed]
    assistance:
      to_buyer:
        - "A4: transport information incl. security requirements"
        - "A5: insurance information"
        - "A6: obtaining a transport document, where the proof of delivery is not one"
        - "A7(b): transit/import clearance documents and information"
      to_seller:
        - "B7(a): export clearance documents and information"
  FOB:
    name: Free on Board
    family: sea
    delivery_point: on_board
    seller_insurance: false
    export_clearance: seller
    import_clearance: buyer
    cost: [S,S,S,S,S,B,B,B,B,B,B,B,B]
    b3_triggers: [nomination_violated, vessel_failed]
    assistance:
      to_buyer:
        - "A4: transport information incl. security requirements"
        - "A5: insurance information"
        - "A6: obtaining a transport document, where the proof of delivery is not one"
        - "A7(b): transit/import clearance documents and information"
      to_seller:
        - "B7(a): export clearance documents and information"
  CFR:
    name: Cost and Freight
    family: sea
    delivery_point: on_board          # risk passes on board; seller pays freight
    seller_insurance: false
    export_clearance: seller
    import_clearance: buyer
    cost: [S,S,S,S,S,S,B,B,B,B,B,B,B]
    b3_triggers: []          # B10-notice limb only; notice obligation not yet modelled
    assistance:
      to_buyer:
        - "A5: insurance information"
        - "A7(b): transit/import clearance documents and information"
      to_seller:
        - "B7(a): export clearance documents and information"
  CIF:
    name: Cost, Insurance and Freight
    family: sea
    delivery_point: on_board
    seller_insurance: true
    insurance_cover: ICC_C_110pct       # CIF default remains ICC (C)
    export_clearance: seller
    import_clearance: buyer
    cost: [S,S,S,S,S,S,S,B,B,B,B,B,B]
    b3_triggers: []          # B10-notice limb only; notice obligation not yet modelled
    assistance:
      to_buyer:
        - "A5: information for additional cover (War/Strikes) requested by the buyer"
        - "A7(b): transit/import clearance documents and information"
      to_seller:
        - "B7(a): export clearance documents and information"
        - "B5: information for additional cover (War/Strikes) the buyer requested"
